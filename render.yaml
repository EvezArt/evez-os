services:
  - type: worker
    name: evez-stream-1-mission-control
    runtime: docker
    dockerfilePath: ./Dockerfile.streams
    envVars:
      - key: STREAM_ID
        value: "1"
      - key: YOUTUBE_STREAM_KEY_1
        sync: false
    autoDeploy: true

