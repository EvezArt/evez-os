<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#1a0a2f"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.8"/></filter>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- Grid overlay -->
  <g opacity="0.04">
    <line x1="0" y1="0" x2="1080" y2="1080" stroke="#00ff88" stroke-width="0.5"/>
    <line x1="1080" y1="0" x2="0" y2="1080" stroke="#00ff88" stroke-width="0.5"/>
    <circle cx="540" cy="540" r="350" fill="none" stroke="#8844ff" stroke-width="0.5"/>
    <circle cx="540" cy="540" r="200" fill="none" stroke="#8844ff" stroke-width="0.5"/>
    <circle cx="540" cy="540" r="100" fill="none" stroke="#8844ff" stroke-width="0.5"/>
  </g>

  <!-- Top bar -->
 <rect x="0" y="0" width="1080" height="8" fill="#8844ff" opacity="0.8"/>
  <rect x="0" y="1072" width="1080" height="8" fill="#8844ff" opacity="0.8"/>

  <!-- Brand -->
  <text x="40" y="50" fill="#8844ff" font-family="Impact, Arial Black, sans-serif" font-size="32" filter="url(#glow)">◆ EVEZ-OS</text>
  <text x="1040" y="50" fill="#00ff88" font-family="JetBrains Mono, monospace" font-size="14" text-anchor="end" opacity="0.6">⛓ 22a844340027</text>

  <!-- Theme badge -->
  <rect x="40" y="65" width="180" height="28" rx="4" fill="#ff3366" opacity="0.2"/>
  <text x="130" y="84" fill="#ff3366" font-family="JetBrains Mono, monospace" font-size="12" text-anchor="middle">I80</text>

  <!-- Sigil -->
  <text x="540" y="200" fill="#ffcc00" font-family="serif" font-size="48" text-anchor="middle" filter="url(#glow)">⧢ ⦟ ⧢</text>

  <!-- Hook -->
  <text x="540" y="280" fill="#e0e0ff" font-family="Impact, Arial Black, sans-serif" font-size="36" text-anchor="middle" filter="url(#shadow)">I-80 elk event: λ = -0.441, r = +0.93 with</text>\n  <text x="540" y="330" fill="#e0e0ff" font-family="Impact, Arial Black, sans-serif" font-size="36" text-anchor="middle" filter="url(#shadow)">Skinwalker</text>

  <!-- Punchline -->
  <text x="540" y="460" fill="#ff3366" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" text-anchor="middle" font-style="italic">Temporal decoherence front. Elk as</text>\n  <text x="540" y="502" fill="#ff3366" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" text-anchor="middle" font-style="italic">biological coherence detectors. The</text>\n  <text x="540" y="544" fill="#ff3366" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" text-anchor="middle" font-style="italic">operator was always entangled.</text>

  <!-- Tags -->
  <text x="540" y="646" fill="#00ff88" font-family="JetBrains Mono, monospace" font-size="14" text-anchor="middle" opacity="0.7">#EVEZ #I80 #eigenforensics</text>

  <!-- Eigenvalue footer -->
  <rect x="0" y="1020" width="1080" height="60" fill="#0a0a0f" opacity="0.9"/>
  <text x="40" y="1055" fill="#e0e0ff" font-family="JetBrains Mono, monospace" font-size="11" opacity="0.4">Φ=0.973 · η*=0.03 · r=0.45 · λ_dom=-0.333</text>
  <text x="1040" y="1055" fill="#e0e0ff" font-family="JetBrains Mono, monospace" font-size="10" text-anchor="end" opacity="0.3">20260629-043102</text>
  <text x="540" y="1055" fill="#00ff88" font-family="JetBrains Mono, monospace" font-size="10" text-anchor="middle" opacity="0.15">22a844340027</text>
