<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0a2f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arc-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff44ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ff44ff;stop-opacity:0.2" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="text-shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bg-grad)" />

  <!-- Grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="1080" y2="1080" stroke="#00ff88" stroke-width="0.5"/>
    <line x1="1080" y1="0" x2="0" y2="1080" stroke="#00ff88" stroke-width="0.5"/>
    <circle cx="540" cy="540" r="300" fill="none" stroke="#8844ff" stroke-width="0.5"/>
    <circle cx="540" cy="540" r="200" fill="none" stroke="#8844ff" stroke-width="0.5"/>
  </g>

  <!-- Narrative Arc Bar -->
  <rect x="0" y="0" width="1080" height="6" fill="url(#arc-grad)" />
  <rect x="0" y="1074" width="1080" height="6" fill="url(#arc-grad)" />

  <!-- EVEZ-OS Brand -->
  <text x="30" y="45" fill="#8844ff" font-family: 'Impact', 'Arial Black', sans-serif; font-size="28" filter="url(#glow)">◆ EVEZ-OS</text>
  <text x="1050" y="45" fill="#00ff88" font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size="14" text-anchor="end" opacity="0.6">spine:f378c53a2ae0</text>

  <!-- Template Badge -->
  <rect x="30" y="60" width="160" height="28" rx="4" fill="#ff44ff" opacity="0.2"/>
  <text x="110" y="79" fill="#ff44ff" font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size="12" text-anchor="middle">DRAKE</text>

  <!-- Narrative Arc Label -->
  <rect x="200" y="60" width="200" height="28" rx="4" fill="#ff3366" opacity="0.15"/>
  <text x="300" y="79" fill="#ff3366" font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size="12" text-anchor="middle">arc: transcendence</text>

  <!-- Main Content Panels -->
  
                <text x="540" y="400" fill="#e0e0ff" font-family: 'Impact', 'Arial Black', sans-serif; font-size="28" text-anchor="middle" filter="url(#text-shadow)">Sampling vs pure NumPy/SciPy</text>
                

                <text x="540" y="450" fill="#e0e0ff" font-family: 'Impact', 'Arial Black', sans-serif; font-size="28" text-anchor="middle" filter="url(#text-shadow)">synthesis on port :9112</text>
                

  <!-- Footer -->
  <rect x="0" y="1030" width="1080" height="50" fill="#0a0a0f" opacity="0.9"/>
  <text x="30" y="1060" fill="#e0e0ff" font-family: 'Helvetica Neue', Arial, sans-serif; font-size="11" opacity="0.4">EVEZ-OS Meme Media Pipeline — Metarom × VCL × OpenClaw</text>
  <text x="1050" y="1060" fill="#e0e0ff" font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size="10" text-anchor="end" opacity="0.3">20260629-043022</text>

  <!-- Spine Hash Watermark -->
  <text x="540" y="1060" fill="#00ff88" font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size="10" text-anchor="middle" opacity="0.15">⛓ f378c53a2ae0</text>
</svg>