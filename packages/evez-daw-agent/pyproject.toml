[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "evez-daw-agent"
version = "1.0.0"
description = "Autonomous music generation DAW — breakcore, dubstep, phonk from pure math. Zero samples needed."
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [
    {name = "Steven Crawford-Maggard", email = "steven@evez-os.ai"},
]
keywords = ["daw", "music", "synthesis", "breakcore", "dubstep", "phonk", "evez", "audio"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Multimedia :: Sound/Audio :: Sound Synthesis",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "numpy>=1.24",
    "scipy>=1.10",
    "soundfile>=0.12",
]

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-asyncio", "ruff"]

[project.urls]
Homepage = "https://evez-os.ai"
Repository = "https://github.com/EvezArt/evez-os"

[project.scripts]
evez-daw = "evez_daw_agent.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
