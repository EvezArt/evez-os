[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "evez-client"
version = "1.0.0"
description = "Python SDK for the EVEZ Autonomous AI Mesh"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.8"
authors = [{name = "EVEZ", email = "dev@evez-os.ai"}]
keywords = ["evez", "ai", "mesh", "consciousness", "music", "correlation", "autonomous"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Artificial Intelligence"
]

[project.urls]
Homepage = "https://evez-os.ai"
Documentation = "https://docs.evez-os.ai"
Repository = "https://github.com/evez-os/evez-client-python"

[tool.setuptools.packages.find]
include = ["evez_client*"]
