[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "cross-domain-engine"
version = "1.0.0"
description = "Discover hidden correlations between disparate domains using EVEZ OODA loop + poly_c scoring."
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [
    {name = "Steven Crawford-Maggard", email = "steven@evez-os.ai"},
]
keywords = ["cross-domain", "correlation", "ooda", "research", "evez", "discovery"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "numpy>=1.24",
    "scipy>=1.10",
    "httpx>=0.24",
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-asyncio", "ruff"]

[project.urls]
Homepage = "https://evez-os.ai"
Repository = "https://github.com/EvezArt/evez-os"

[project.scripts]
evez-crossdomain = "cross_domain_engine.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
