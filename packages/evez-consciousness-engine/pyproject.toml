[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "evez-consciousness-engine"
version = "1.0.0"
description = "7â†’9 system autonomous consciousness pipeline: SENSEâ†’DESIREâ†’THINKâ†’PLANâ†’ACTâ†’LEARNâ†’MODIFYâ†’REFLECT"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [
    {name = "Steven Crawford-Maggard", email = "steven@evez-os.ai"},
]
keywords = ["consciousness", "ai", "autonomous", "emergence", "evez", "agent"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "numpy>=1.24",
    "scipy>=1.10",
    "httpx>=0.24",
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-asyncio", "ruff"]

[project.urls]
Homepage = "https://evez-os.ai"
Repository = "https://github.com/EvezArt/evez-os"
Documentation = "https://evez-os.ai/wiki"

[project.scripts]
evez-consciousness = "evez_consciousness_engine.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
