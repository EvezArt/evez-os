name: EVEZ Spine CI

on:
  push:
    branches: [main, 'fix/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-play-visualize:
    name: Lint - Play - Visualize
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install optional dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pillow scipy || true

      - name: Seed spine (init)
        run: python3 tools/evez.py init

      - name: Lint spine
        run: python3 tools/evez.py lint

      - name: Play engine
        run: python3 tools/evez.py play --seed 42 --steps 14

      - name: Verify spine
        run: python3 tools/evez.py verify

      - name: Visualize spine
        run: |
          python3 tools/evez.py visualize-thought \
            --input spine/spine.jsonl \
            --out ci_artifacts \
            --fps 2 || echo "Visualizer skipped (no spine.jsonl)"

      - name: Run os-evez pytest suite
        run: |
          pip install -e os-evez[dev] --quiet
          python -m pytest os-evez/tests/ -v

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: evez-cognition-${{ github.sha }}
          path: |
            ci_artifacts/
            spine/
          retention-days: 30
          if-no-files-found: warn
