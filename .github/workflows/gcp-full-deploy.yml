name: GCP Full Deploy — EVEZ Firmament

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - 'cloud-init.sh'
      - 'scripts/gcp-*.sh'
      - '.github/workflows/gcp-full-deploy.yml'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force full redeploy'
        required: false
        default: 'false'

env:
  GCP_PROJECT: evez-firmament
  GCP_REGION: us-central1

jobs:
  validate:
    name: Validate Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Check GCP_SERVICE_ACCOUNT_KEY is set
        run: |
          if [ -z "${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}" ]; then
            echo ""
            echo "╔══════════════════════════════════════════════════════════════╗"
            echo "║  BLOCKED: GCP_SERVICE_ACCOUNT_KEY is not set               ║"
            echo "║                                                              ║"
            echo "║  Run scripts/evez-gcp-auth-hardening.sh on any GCP-        ║"
            echo "║  authenticated machine, then paste the JSON output into:    ║"
            echo "║  github.com/EvezArt/evez-os/settings/secrets/actions       ║"
            echo "║                                                              ║"
            echo "║  Secret name: GCP_SERVICE_ACCOUNT_KEY                      ║"
            echo "╚══════════════════════════════════════════════════════════════╝"
            echo ""
            exit 1
          fi
          echo "✅ GCP_SERVICE_ACCOUNT_KEY is set"

  deploy:
    name: Deploy to GCP Firmament
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Service Account — non-expiring)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Verify GCP Access
        run: |
          echo "Authenticated as: $(gcloud config get-value account)"
          echo "Project: $(gcloud config get-value project)"
          gcloud compute zones list --filter="region:us-central1" --limit=3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -out=tfplan
        env:
          TF_VAR_project_id: ${{ env.GCP_PROJECT }}
          TF_VAR_region: ${{ env.GCP_REGION }}
          TF_VAR_ssh_public_key: ${{ secrets.GCP_SSH_PUBLIC_KEY }}

      - name: Terraform Apply
        working-directory: terraform
        if: github.ref == 'refs/heads/main' || inputs.force_deploy == 'true'
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_project_id: ${{ env.GCP_PROJECT }}
          TF_VAR_region: ${{ env.GCP_REGION }}
          TF_VAR_ssh_public_key: ${{ secrets.GCP_SSH_PUBLIC_KEY }}

      - name: Get Node IPs
        working-directory: terraform
        run: |
          echo "=== Deployed Nodes ==="
          terraform output -json node_ips 2>/dev/null || echo "(outputs not yet available)"

      - name: Update mesh config with new node IPs
        run: |
          echo "Mesh deploy complete. Quantum ports 9126-9128 included in cloud-init."
          echo "All 16 services will be live on each node after bootstrap."

      - name: Summary
        run: |
          echo "## 🚀 GCP Firmament Deploy Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Project**: ${{ env.GCP_PROJECT }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Region**: ${{ env.GCP_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Auth**: Service Account (permanent, non-expiring)" >> $GITHUB_STEP_SUMMARY
          echo "- **Services**: 16 ports (9111-9128)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Next: paste GCP node IPs into MEMORY.md and evez-os config." >> $GITHUB_STEP_SUMMARY
