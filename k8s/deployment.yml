    matchLabels:
      app: metrics
  template:
    metadata:
      labels:
        app: metrics
        tier: infra
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9123"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: evez-mesh-sa
      containers:
        - name: metrics
          image: gcr.io/EVEZ_PROJECT/evez-metrics:latest
          imagePullPolicy: Always
          ports:
