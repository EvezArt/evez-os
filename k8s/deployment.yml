# ============================================================================
# EVEZ Mesh — Kubernetes Deployment for GKE
#
# Namespace: evez-mesh
# Services:   All 11 EVEZ microservices
# Usage:
#   kubectl apply -k k8s/              # Apply all resources
#   kubectl get all -n evez-mesh       # Check status
#   kubectl port-forward -n evez-mesh svc/gateway 9118:9118
# ============================================================================

---
apiVersion: v1
kind: Namespace
metadata:
  name: evez-mesh
  labels:
    app.kubernetes.io/name: evez-mesh
    app.kubernetes.io/part-of: evez-firmament

---
# ─── ConfigMap ────────────────────────────────────────────────────────────────

apiVersion: v1
kind: ConfigMap
metadata:
  name: evez-config
  namespace: evez-mesh
data:
  EVEZ_NODE_NAME: "Evez666"
  SPINE_URL: "http://event-spine:9116"
  GATEWAY_URL: "http://gateway:9118"
  CONSCIOUSNESS_URL: "http://consciousness-engine:9111"
  RQNS_URL: "http://rqns:9119"
  SIBLINGS: "consciousness-engine:9111,daw-agent:9112,machine-voice:9113,cross-domain:9114,invariance-battery:9115,event-spine:9116"

---
# ─── Secret (placeholder — fill with real values or use External Secrets) ───

apiVersion: v1
kind: Secret
metadata:
  name: evez-secrets
  namespace: evez-mesh
type: Opaque
stringData:
  # Replace with real values before applying, or use Sealed Secrets / External Secrets Operator
  vultr-api-key: ""
  eve-node-ip: ""

---
# ─── ServiceAccount ──────────────────────────────────────────────────────────

apiVersion: v1
kind: ServiceAccount
metadata:
  name: evez-mesh-sa
  namespace: evez-mesh
  labels:
    app.kubernetes.io/name: evez-mesh

---
# ─── PersistentVolumeClaim — Event Spine Data ────────────────────────────────

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: spine-data
  namespace: evez-mesh
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard-rwo

---
# ═══════════════════════════════════════════════════════════════════════════════
# 1. Event Spine (9116) — Must start first
# ═══════════════════════════════════════════════════════════════════════════════

apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-spine
  namespace: evez-mesh
  labels:
    app: event-spine
    tier: core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-spine
  template:
    metadata:
      labels:
        app: event-spine
        tier: core
    spec:
      serviceAccountName: evez-mesh-sa
      containers:
        - name: event-spine
          image: gcr.io/EVEZ_PROJECT/evez-event-spine:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 9116
          envFrom:
            - configMapRef:
                name: evez-config
          volumeMounts:
            - name: spine-data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /health
              port: 9116
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 9116
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: spine-data
          persistentVolumeClaim:
            claimName: spine-data

---
apiVersion: v1
kind: Service
metadata:
  name: event-spine
  namespace: evez-mesh
spec:
  selector:
    app: event-spine
  ports:
    - port: 9116
      targetPort: 9116
  clusterIP: None  # Headless for internal mesh

---
