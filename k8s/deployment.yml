# ═══════════════════════════════════════════════════════════════════════════════
# GKE Ingress — Expose Gateway
# ═══════════════════════════════════════════════════════════════════════════════

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: evez-gateway-ingress
  namespace: evez-mesh
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: "evez-gateway-ip"
    networking.gke.io/managed-certificates: "evez-gateway-cert"
spec:
  defaultBackend:
    service:
      name: gateway
      port:
        number: 80

---
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: evez-gateway-cert
  namespace: evez-mesh
spec:
  domains:
    - gateway.evez-os.ai

---
# ═══════════════════════════════════════════════════════════════════════════════
# HorizontalPodAutoscaler — Gateway auto-scale
# ═══════════════════════════════════════════════════════════════════════════════

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gateway-hpa
  namespace: evez-mesh
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

---
# ═══════════════════════════════════════════════════════════════════════════════
# PodDisruptionBudget — Gateway
# ═══════════════════════════════════════════════════════════════════════════════

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gateway-pdb
  namespace: evez-mesh
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: gateway

---
# ═══════════════════════════════════════════════════════════════════════════════
# NetworkPolicy — Restrict mesh traffic
# ═══════════════════════════════════════════════════════════════════════════════

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: evez-mesh-policy
  namespace: evez-mesh
spec:
  podSelector:
    matchLabels:
      tier: core
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: evez-mesh
    - from:
        - podSelector:
            matchLabels:
              tier: infra
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: evez-mesh
