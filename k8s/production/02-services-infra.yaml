# EVEZ K8s Production - Infrastructure Services (9117-9125) + Gateway + NetworkPolicy + Ingress + PVCs
---
# ─── Mesh Health (:9117) ──────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata: { name: mesh-health, namespace: evez-mesh, labels: { app: mesh-health, tier: infra } }
spec:
  replicas: 2
  selector: { matchLabels: { app: mesh-health } }
  template:
    metadata: { labels: { app: mesh-health } }
    spec:
      serviceAccountName: evez-mesh-sa
      containers:
        - name: mesh-health
          image: evez/mesh-health:latest
          ports: [{ containerPort: 9117 }]
          envFrom: [{ configMapRef: { name: evez-mesh-config } }]
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 256Mi }
          livenessProbe:
            httpGet: { path: /health, port: 9117 }
            initialDelaySeconds: 10; periodSeconds: 15
          readinessProbe:
            httpGet: { path: /health, port: 9117 }
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata: { name: mesh-health, namespace: evez-mesh }
spec: { selector: { app: mesh-health }, ports: [{ port: 9117, targetPort: 9117, name: http }] }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: mesh-health-hpa, namespace: evez-mesh }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: mesh-health }
  minReplicas: 2; maxReplicas: 3
  metrics:
    - type: Resource; resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata: { name: mesh-health, namespace: evez-mesh, labels: { release: prometheus } }
spec:
  selector: { matchLabels: { app: mesh-health } }
  endpoints: [{ port: http, path: /metrics }]
---
# ─── Gateway (:9118) ─────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata: { name: gateway, namespace: evez-mesh, labels: { app: gateway, tier: infra } }
spec:
  replicas: 3
  selector: { matchLabels: { app: gateway } }
  template:
    metadata: { labels: { app: gateway } }
    spec:
      serviceAccountName: evez-mesh-sa
      containers:
        - name: gateway
          image: evez/gateway:latest
          ports: [{ containerPort: 9118 }]
          envFrom: [{ configMapRef: { name: evez-mesh-config } }]
          env:
            - { name: CONSCIOUSNESS_URL, value: "http://consciousness-engine:9111" }
            - { name: DAW_URL, value: "http://daw-agent:9112" }
            - { name: VOICE_URL, value: "http://machine-voice:9113" }
            - { name: CROSS_DOMAIN_URL, value: "http://cross-domain-engine:9114" }
            - { name: INVARIANCE_URL, value: "http://invariance-battery:9115" }
            - { name: SPINE_URL, value: "http://event-spine:9116" }
            - { name: MESH_URL, value: "http://mesh-health:9117" }
            - { name: RQNS_URL, value: "http://rqns-pipeline:9119" }
            - { name: WEBHOOK_URL, value: "http://webhook-relay:9121" }
            - { name: METRICS_URL, value: "http://metrics:9123" }
          resources:
            requests: { cpu: 200m, memory: 128Mi }
            limits: { cpu: "1", memory: 256Mi }
          livenessProbe:
            httpGet: { path: /health, port: 9118 }
            initialDelaySeconds: 10; periodSeconds: 10
          readinessProbe:
            httpGet: { path: /health, port: 9118 }
            initialDelaySeconds: 5; periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata: { name: gateway, namespace: evez-mesh }
spec: { type: ClusterIP, selector: { app: gateway }, ports: [{ port: 9118, targetPort: 9118, name: http }] }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: gateway-hpa, namespace: evez-mesh }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: gateway }
  minReplicas: 3; maxReplicas: 8
  metrics:
    - type: Resource; resource: { name: cpu, target: { type: Utilization, averageUtilization: 60 } }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: { name: gateway-pdb, namespace: evez-mesh }
spec: { minAvailable: 2, selector: { matchLabels: { app: gateway } } }
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata: { name: gateway, namespace: evez-mesh, labels: { release: prometheus } }
spec:
  selector: { matchLabels: { app: gateway } }
  endpoints: [{ port: http, path: /metrics }]
---
