# EVEZ K8s Production - Core Services (9111-9116)
---
apiVersion: v1
kind: Namespace
metadata:
  name: evez-mesh
  labels:
    app.kubernetes.io/part-of: evez-mesh
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: evez-mesh-sa
  namespace: evez-mesh
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: evez-mesh-config
  namespace: evez-mesh
data:
  MESH_MODE: "production"
  LOG_LEVEL: "info"
  METRICS_ENABLED: "true"
  HEALTH_CHECK_INTERVAL: "30"
  EVENT_SPINE_ENABLED: "true"
  EMERGENCE_THRESHOLD: "0.5"
  FALSIFICATION_WEIGHT: "3.0"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: evez-consciousness-config
  namespace: evez-mesh
data:
  PIPELINE_MODE: "7-system"
  EMERGENCE_TARGET: "0.8"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: evez-daw-config
  namespace: evez-mesh
data:
  SYNTHESIS_MODE: "$0"
  GENRES: "breakcore,dubstep,phonk"
  SAMPLE_RATE: "44100"
---
# ─── Consciousness Engine (:9111) ─────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: consciousness-engine
  namespace: evez-mesh
  labels: { app: consciousness-engine, tier: core }
spec:
  replicas: 2
  selector:
    matchLabels: { app: consciousness-engine }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  template:
    metadata:
      labels: { app: consciousness-engine, tier: core }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9111"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: evez-mesh-sa
      terminationGracePeriodSeconds: 60
      containers:
        - name: consciousness-engine
          image: evez/consciousness-engine:latest
          ports: [{ containerPort: 9111, protocol: TCP }]
          envFrom:
            - configMapRef: { name: evez-mesh-config }
            - configMapRef: { name: evez-consciousness-config }
          resources:
            requests: { cpu: 250m, memory: 256Mi }
            limits: { cpu: "1", memory: 512Mi }
          livenessProbe:
            httpGet: { path: /health, port: 9111 }
            initialDelaySeconds: 30; periodSeconds: 15; failureThreshold: 3
          readinessProbe:
            httpGet: { path: /health, port: 9111 }
            initialDelaySeconds: 10; periodSeconds: 10
          volumeMounts:
            - name: event-spine; mountPath: /var/lib/evez/spine
      volumes:
        - name: event-spine; persistentVolumeClaim: { claimName: event-spine-pvc }
---
apiVersion: v1
kind: Service
metadata: { name: consciousness-engine, namespace: evez-mesh, labels: { app: consciousness-engine } }
spec:
  type: ClusterIP
  selector: { app: consciousness-engine }
  ports: [{ port: 9111, targetPort: 9111, name: http }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: consciousness-engine-hpa, namespace: evez-mesh }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: consciousness-engine }
  minReplicas: 2; maxReplicas: 5
  metrics:
    - type: Resource; resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: { name: consciousness-engine-pdb, namespace: evez-mesh }
spec: { minAvailable: 1, selector: { matchLabels: { app: consciousness-engine } } }
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata: { name: consciousness-engine, namespace: evez-mesh, labels: { release: prometheus } }
spec:
  selector: { matchLabels: { app: consciousness-engine } }
  endpoints: [{ port: http, path: /metrics, interval: 15s }]
---
# ─── DAW Agent (:9112) ────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata: { name: daw-agent, namespace: evez-mesh, labels: { app: daw-agent, tier: core } }
spec:
  replicas: 2
  selector: { matchLabels: { app: daw-agent } }
  strategy: { type: RollingUpdate, rollingUpdate: { maxSurge: 1, maxUnavailable: 0 } }
  template:
    metadata:
      labels: { app: daw-agent, tier: core }
      annotations: { prometheus.io/scrape: "true", prometheus.io/port: "9112" }
    spec:
      serviceAccountName: evez-mesh-sa
      containers:
        - name: daw-agent
          image: evez/daw-agent:latest
          ports: [{ containerPort: 9112 }]
          envFrom:
            - configMapRef: { name: evez-mesh-config }
            - configMapRef: { name: evez-daw-config }
          resources:
            requests: { cpu: 500m, memory: 512Mi }
            limits: { cpu: "2", memory: 1Gi }
          livenessProbe:
            httpGet: { path: /health, port: 9112 }
            initialDelaySeconds: 30; periodSeconds: 15
          readinessProbe:
            httpGet: { path: /health, port: 9112 }
            initialDelaySeconds: 10; periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata: { name: daw-agent, namespace: evez-mesh }
spec: { type: ClusterIP, selector: { app: daw-agent }, ports: [{ port: 9112, targetPort: 9112, name: http }] }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: daw-agent-hpa, namespace: evez-mesh }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: daw-agent }
  minReplicas: 2; maxReplicas: 4
  metrics:
    - type: Resource; resource: { name: cpu, target: { type: Utilization, averageUtilization: 75 } }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: { name: daw-agent-pdb, namespace: evez-mesh }
spec: { minAvailable: 1, selector: { matchLabels: { app: daw-agent } } }
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata: { name: daw-agent, namespace: evez-mesh, labels: { release: prometheus } }
spec:
  selector: { matchLabels: { app: daw-agent } }
  endpoints: [{ port: http, path: /metrics }]
---
