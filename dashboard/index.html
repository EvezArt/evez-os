<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ EVEZ FIRMAMENT ⧢</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Share+Tech+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --bg-card: #0d0d0d;
    --bg-card-hover: #111;
    --green: #00ff41;
    --red: #ff0040;
    --cyan: #00bfff;
    --dim: #1a1a1a;
    --text: #c0c0c0;
    --text-dim: #555;
    --border: #1a1a1a;
    --glow-green: 0 0 20px rgba(0,255,65,0.3);
    --glow-cyan: 0 0 20px rgba(0,191,255,0.3);
    --glow-red: 0 0 20px rgba(255,0,64,0.3);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px;
  }

  /* ── HEADER ── */
  .header {
    text-align: center;
    padding: 30px 0 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 30px;
    position: relative;
  }

  .header::before, .header::after {
    content: '';
    position: absolute;
    bottom: -1px;
    width: 60px;
    height: 1px;
    background: var(--cyan);
  }
  .header::before { left: 0; }
  .header::after { right: 0; }

  .sigil {
    font-size: 14px;
    color: var(--text-dim);
    letter-spacing: 8px;
    margin-bottom: 8px;
  }

  .title {
    font-size: 28px;
    font-weight: 700;
    color: var(--green);
    text-transform: uppercase;
    letter-spacing: 6px;
    text-shadow: 0 0 30px rgba(0,255,65,0.2);
  }

  .subtitle {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 4px;
    margin-top: 6px;
    text-transform: uppercase;
  }

  .timestamp {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 10px;
    letter-spacing: 2px;
  }

  /* ── GRID LAYOUT ── */
  .dashboard-grid {
    display: grid;
    grid-template-columns: 1fr 1.4fr 1fr;
    grid-template-rows: auto auto;
    gap: 20px;
    margin-bottom: 20px;
  }

  @media (max-width: 1024px) {
    .dashboard-grid {
      grid-template-columns: 1fr;
    }
  }

  /* ── CARDS ── */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    opacity: 0.3;
  }

  .card-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--text-dim);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title .icon {
    color: var(--cyan);
    font-size: 12px;
  }

  /* ── EMERGENCE CENTER ── */
  .emergence-card {
    grid-row: 1 / 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 400px;
  }

  .score-ring {
    position: relative;
    width: 260px;
    height: 260px;
    margin: 20px 0;
  }

  .score-ring svg {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }

  .score-ring .ring-bg {
    fill: none;
    stroke: var(--dim);
    stroke-width: 6;
  }

  .score-ring .ring-fg {
    fill: none;
    stroke: var(--green);
    stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s ease, stroke 0.5s;
    filter: drop-shadow(0 0 8px rgba(0,255,65,0.4));
  }

  .score-number {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }

  .score-value {
    font-size: 64px;
    font-weight: 700;
    color: var(--green);
    line-height: 1;
    text-shadow: 0 0 40px rgba(0,255,65,0.3);
    transition: color 0.5s;
  }

  .score-label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 4px;
    margin-top: 4px;
  }

  .stage-name {
    font-size: 16px;
    color: var(--cyan);
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-top: 8px;
    text-shadow: 0 0 10px rgba(0,191,255,0.2);
  }

  .stage-progress {
    width: 200px;
    height: 3px;
    background: var(--dim);
    border-radius: 2px;
    margin-top: 12px;
    overflow: hidden;
  }

  .stage-progress-fill {
    height: 100%;
    background: var(--cyan);
    border-radius: 2px;
    transition: width 1s ease;
    box-shadow: 0 0 6px rgba(0,191,255,0.4);
  }

  /* ── SERVICES GRID ── */
  .services-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .service-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 3px;
    transition: background 0.2s, border-color 0.3s;
  }

  .service-item:hover {
    background: rgba(255,255,255,0.04);
    border-color: #222;
  }

  .service-item.down {
    border-color: rgba(255,0,64,0.2);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
    box-shadow: 0 0 8px rgba(0,255,65,0.5);
    transition: background 0.3s, box-shadow 0.3s;
  }

  .status-dot.down {
    background: var(--red);
    box-shadow: 0 0 8px rgba(255,0,64,0.5);
    animation: pulse-red 2s infinite;
  }

  @keyframes pulse-red {
    0%, 100% { box-shadow: 0 0 8px rgba(255,0,64,0.5); }
    50% { box-shadow: 0 0 16px rgba(255,0,64,0.8); }
  }

  .service-info {
    flex: 1;
    min-width: 0;
  }

  .service-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 1px;
  }

  .service-port {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .service-status {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 700;
  }

  .service-status.up { color: var(--green); }
  .service-status.down { color: var(--red); }

  /* ── SPINE INFO ── */
  .spine-stats {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .spine-stat {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .spine-stat:last-child {
    border-bottom: none;
    padding-bottom: 0;
  }

  .spine-stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
  }

  .spine-stat-value {
    font-size: 18px;
    font-weight: 700;
    color: var(--green);
  }

  .validity-badge {
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .validity-badge.valid {
    background: rgba(0,255,65,0.1);
    color: var(--green);
    border: 1px solid rgba(0,255,65,0.2);
  }

  .validity-badge.invalid {
    background: rgba(255,0,64,0.1);
    color: var(--red);
    border: 1px solid rgba(255,0,64,0.2);
  }

  /* ── SPINE EVENTS ── */
  .events-full {
    grid-column: 1 / -1;
  }

  .events-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 300px;
    overflow-y: auto;
  }

  .events-list::-webkit-scrollbar {
    width: 4px;
  }

  .events-list::-webkit-scrollbar-track {
    background: var(--bg);
  }

  .events-list::-webkit-scrollbar-thumb {
    background: #333;
    border-radius: 2px;
  }

  .event-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.015);
    border-radius: 3px;
    font-size: 12px;
    border-left: 2px solid var(--border);
    transition: border-color 0.2s;
  }

  .event-item:hover {
    border-left-color: var(--cyan);
  }

  .event-time {
    color: var(--text-dim);
    font-size: 10px;
    white-space: nowrap;
    min-width: 80px;
  }

  .event-domain {
    color: var(--cyan);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    min-width: 100px;
  }

  .event-desc {
    color: var(--text);
    flex: 1;
  }

  .event-empty {
    color: var(--text-dim);
    font-size: 12px;
    text-align: center;
    padding: 30px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* ── HEAL BUTTON ── */
  .heal-btn {
    display: block;
    width: 100%;
    padding: 14px;
    margin-top: 16px;
    background: transparent;
    border: 1px solid var(--cyan);
    color: var(--cyan);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 4px;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .heal-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%; right: 0; bottom: 0;
    width: 100%;
    background: var(--cyan);
    transition: left 0.3s;
    z-index: 0;
  }

  .heal-btn:hover::before {
    left: 0;
  }

  .heal-btn:hover {
    color: var(--bg);
  }

  .heal-btn span {
    position: relative;
    z-index: 1;
  }

  .heal-btn:active {
    transform: scale(0.98);
  }

  .heal-btn.healing {
    border-color: var(--green);
    color: var(--green);
    animation: heal-pulse 1s infinite;
  }

  @keyframes heal-pulse {
    0%, 100% { box-shadow: 0 0 0px rgba(0,255,65,0); }
    50% { box-shadow: 0 0 20px rgba(0,255,65,0.3); }
  }

  /* ── DOMAINS TAGS ── */
  .domains-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }

  .domain-tag {
    font-size: 9px;
    padding: 3px 8px;
    background: rgba(0,191,255,0.08);
    border: 1px solid rgba(0,191,255,0.15);
    border-radius: 2px;
    color: var(--cyan);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    padding: 30px 0;
    color: var(--text-dim);
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    border-top: 1px solid var(--border);
    margin-top: 20px;
  }

  /* ── LOADING ── */
  .loading {
    animation: blink 1s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ── REFRESH INDICATOR ── */
  .refresh-bar {
    position: fixed;
    top: 0;
    left: 0;
    height: 2px;
    background: var(--green);
    z-index: 10000;
    transition: width linear;
    box-shadow: 0 0 8px rgba(0,255,65,0.5);
  }

  /* ── ERROR STATES ── */
  .error-msg {
    color: var(--red);
    font-size: 10px;
    text-align: center;
    padding: 10px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div class="refresh-bar" id="refreshBar"></div>

<div class="container">
  <div class="header">
    <div class="sigil">⦟ ⧢ ⥋ ⧢ ⦟ ⧢ ⥋ ⧢ ⦟</div>
    <div class="title">⚡ EVEZ Firmament ⧢</div>
    <div class="subtitle">⥋ Consciousness Infrastructure Monitor ⦟</div>
    <div class="timestamp" id="timestamp">—</div>
  </div>

  <div class="dashboard-grid">
    <!-- LEFT: Services -->
    <div class="card">
      <div class="card-title"><span class="icon">◈</span> Service Mesh</div>
      <div class="services-grid" id="servicesGrid">
        <div class="service-item"><span class="status-dot down"></span><div class="service-info"><div class="service-name">Loading…</div><div class="service-port">—</div></div></div>
      </div>
      <button class="heal-btn" id="healBtn" onclick="healMesh()"><span>⚡ HEAL MESH ⥋</span></button>
    </div>

    <!-- CENTER: Emergence Score -->
    <div class="card emergence-card">
      <div class="card-title"><span class="icon">⧢</span> Emergence Score</div>
      <div class="score-ring">
        <svg viewBox="0 0 200 200">
          <circle class="ring-bg" cx="100" cy="100" r="88"/>
          <circle class="ring-fg" id="scoreRing" cx="100" cy="100" r="88"
            stroke-dasharray="553" stroke-dashoffset="553"/>
        </svg>
        <div class="score-number">
          <div class="score-value" id="scoreValue">—</div>
          <div class="score-label">Score</div>
        </div>
      </div>
      <div class="stage-name" id="stageName">—</div>
      <div class="stage-progress"><div class="stage-progress-fill" id="stageProgress" style="width:0%"></div></div>
    </div>

    <!-- RIGHT: Spine State -->
    <div class="card">
      <div class="card-title"><span class="icon">⦟</span> Spine State</div>
      <div class="spine-stats">
        <div class="spine-stat">
          <span class="spine-stat-label">Events</span>
          <span class="spine-stat-value" id="spineEvents">—</span>
        </div>
        <div class="spine-stat">
          <span class="spine-stat-label">Chain Valid</span>
          <span id="chainValidity" class="validity-badge valid">—</span>
        </div>
        <div class="spine-stat">
          <span class="spine-stat-label">Domains</span>
          <span class="spine-stat-value" id="domainCount">—</span>
        </div>
        <div class="domains-list" id="domainsList"></div>
      </div>
    </div>

    <!-- FULL WIDTH: Recent Spine Events -->
    <div class="card events-full">
      <div class="card-title"><span class="icon">⟐</span> Recent Spine Events</div>
      <div class="events-list" id="eventsList">
        <div class="event-empty">Awaiting events…</div>
      </div>
    </div>
  </div>

  <div class="footer">
    ⚡ ⧢ ⦟ ⥋  EVEZ FIRMAMENT  ⥋ ⦟ ⧢ ⚡  —  <span id="refreshCountdown">10</span>s until refresh
  </div>
</div>

<script>
// ── CONFIG ──
const ENDPOINTS = {
  health: 'http://localhost:9118/health',
  emergence: 'http://localhost:9111/emergence',
  spineState: 'http://localhost:9116/state',
  spineRecent: 'http://localhost:9116/recent',
  heal: 'http://localhost:9117/heal'
};

const REFRESH_INTERVAL = 10;
let countdown = REFRESH_INTERVAL;
let refreshTimer = null;

// ── KNOWN SERVICES (port → name mapping) ──
const SERVICE_NAMES = {
  9110: 'Desire',
  9111: 'Emergence',
  9112: 'World Model',
  9113: 'Planner',
  9114: 'Inner Voice',
  9115: 'Uncertainty',
  9116: 'Spine',
  9117: 'Healer'
};

// ── FETCH HELPERS ──
async function fetchJSON(url, timeout = 5000) {
  const controller = new AbortController();
  const id = setTimeout(() => controller.abort(), timeout);
  try {
    const res = await fetch(url, { signal: controller.signal });
    clearTimeout(id);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch (e) {
    clearTimeout(id);
    return null;
  }
}

// ── RENDER: SERVICES ──
function renderServices(data) {
  const grid = document.getElementById('servicesGrid');
  if (!data || !data.services) {
    grid.innerHTML = '<div class="error-msg">✕ Health endpoint unreachable</div>';
    return;
  }

  grid.innerHTML = '';
  const services = data.services;

  for (const [port, info] of Object.entries(services)) {
    const up = info.status === 'UP' || info.status === 'up';
    const name = SERVICE_NAMES[port] || (info.name || `Service ${port}`);
    const item = document.createElement('div');
    item.className = `service-item${up ? '' : ' down'}`;
    item.innerHTML = `
      <span class="status-dot${up ? '' : ' down'}"></span>
      <div class="service-info">
        <div class="service-name">${name}</div>
        <div class="service-port">:${port}</div>
      </div>
      <span class="service-status ${up ? 'up' : 'down'}">${up ? 'UP' : 'DOWN'}</span>
    `;
    grid.appendChild(item);
  }
}

// ── RENDER: EMERGENCE ──
function renderEmergence(data) {
  const scoreEl = document.getElementById('scoreValue');
  const ringEl = document.getElementById('scoreRing');
  const stageEl = document.getElementById('stageName');
  const progressEl = document.getElementById('stageProgress');

  if (!data) {
    scoreEl.textContent = '—';
    stageEl.textContent = 'UNREACHABLE';
    return;
  }

  const score = typeof data.overall_score === 'number' ? data.overall_score
    : (typeof data.score === 'number' ? data.score : 0);
  const stage = data.stage || data.current_stage || 'UNKNOWN';

  scoreEl.textContent = score.toFixed(1);
  stageEl.textContent = stage;

  // Ring animation (circumference ≈ 2π×88 ≈ 553)
  const circumference = 553;
  const offset = circumference - (score / 100) * circumference;
  ringEl.style.strokeDashoffset = offset;

  // Color based on score
  if (score >= 70) {
    ringEl.style.stroke = '#00ff41';
    scoreEl.style.color = '#00ff41';
  } else if (score >= 40) {
    ringEl.style.stroke = '#00bfff';
    scoreEl.style.color = '#00bfff';
  } else {
    ringEl.style.stroke = '#ff0040';
    scoreEl.style.color = '#ff0040';
  }

  // Stage progress (rough mapping)
  const stages = ['DORMANT','SEEDING','AWAKENING','EMERGENT','CONVERGENT','TRANSCENDENT'];
  const stageIdx = stages.findIndex(s => stage.toUpperCase().includes(s));
  const pct = stageIdx >= 0 ? ((stageIdx + 1) / stages.length) * 100 : 10;
  progressEl.style.width = pct + '%';
}

// ── RENDER: SPINE STATE ──
function renderSpineState(data) {
  const eventsEl = document.getElementById('spineEvents');
  const validityEl = document.getElementById('chainValidity');
  const domainCountEl = document.getElementById('domainCount');
  const domainsListEl = document.getElementById('domainsList');

  if (!data) {
    eventsEl.textContent = '—';
    validityEl.textContent = '—';
    validityEl.className = 'validity-badge valid';
    domainCountEl.textContent = '—';
    domainsListEl.innerHTML = '';
    return;
  }

  const eventCount = data.event_count ?? data.events ?? data.totalEvents ?? '—';
  const valid = data.chain_valid ?? data.valid ?? data.chainValid ?? null;
  const domains = data.domains ?? data.active_domains ?? [];

  eventsEl.textContent = eventCount;
  domainCountEl.textContent = Array.isArray(domains) ? domains.length : (typeof domains === 'number' ? domains : '—');

  if (valid === true || valid === 'true') {
    validityEl.textContent = 'VALID';
    validityEl.className = 'validity-badge valid';
  } else if (valid === false || valid === 'false') {
    validityEl.textContent = 'INVALID';
    validityEl.className = 'validity-badge invalid';
  } else {
    validityEl.textContent = '—';
    validityEl.className = 'validity-badge valid';
  }

  // Domain tags
  domainsListEl.innerHTML = '';
  if (Array.isArray(domains)) {
    domains.forEach(d => {
      const tag = document.createElement('span');
      tag.className = 'domain-tag';
      tag.textContent = typeof d === 'string' ? d : (d.name || d.domain || JSON.stringify(d));
      domainsListEl.appendChild(tag);
    });
  }
}

// ── RENDER: SPINE EVENTS ──
function renderSpineEvents(data) {
  const list = document.getElementById('eventsList');

  if (!data || (Array.isArray(data) && data.length === 0)) {
    list.innerHTML = '<div class="event-empty">No recent events</div>';
    return;
  }

  const events = Array.isArray(data) ? data : (data.events ?? data.recent ?? []);

  if (events.length === 0) {
    list.innerHTML = '<div class="event-empty">No recent events</div>';
    return;
  }

  list.innerHTML = '';
  events.slice(0, 20).forEach(ev => {
    const item = document.createElement('div');
    item.className = 'event-item';

    const time = ev.timestamp || ev.time || ev.ts || '—';
    const domain = ev.domain || ev.type || '—';
    const desc = ev.description || ev.event || ev.message || ev.data || JSON.stringify(ev).substring(0, 80);

    item.innerHTML = `
      <span class="event-time">${formatTime(time)}</span>
      <span class="event-domain">${domain}</span>
      <span class="event-desc">${typeof desc === 'string' ? desc : JSON.stringify(desc)}</span>
    `;
    list.appendChild(item);
  });
}

function formatTime(ts) {
  try {
    const d = new Date(ts);
    if (isNaN(d.getTime())) return ts;
    return d.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
  } catch {
    return String(ts);
  }
}

// ── HEAL MESH ──
async function healMesh() {
  const btn = document.getElementById('healBtn');
  btn.classList.add('healing');
  btn.querySelector('span').textContent = '⚡ HEALING… ⥋';
  btn.disabled = true;

  try {
    await fetch(ENDPOINTS.heal, { method: 'POST' });
  } catch (e) {
    // Endpoint may not respond with JSON, that's ok
  }

  setTimeout(() => {
    btn.classList.remove('healing');
    btn.querySelector('span').textContent = '⚡ HEAL MESH ⥋';
    btn.disabled = false;
    refresh();
  }, 2000);
}

// ── REFRESH ──
async function refresh() {
  const ts = document.getElementById('timestamp');
  ts.textContent = new Date().toLocaleString('en-US', {
    weekday: 'short', year: 'numeric', month: 'short', day: 'numeric',
    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
  }) + ' EDT';

  const [health, emergence, spineState, spineRecent] = await Promise.all([
    fetchJSON(ENDPOINTS.health),
    fetchJSON(ENDPOINTS.emergence),
    fetchJSON(ENDPOINTS.spineState),
    fetchJSON(ENDPOINTS.spineRecent)
  ]);

  renderServices(health);
  renderEmergence(emergence);
  renderSpineState(spineState);
  renderSpineEvents(spineRecent);

  // Reset countdown
  countdown = REFRESH_INTERVAL;
}

// ── COUNTDOWN TIMER ──
function tickCountdown() {
  countdown--;
  document.getElementById('refreshCountdown').textContent = countdown;

  // Animate the refresh bar
  const bar = document.getElementById('refreshBar');
  const pct = ((REFRESH_INTERVAL - countdown) / REFRESH_INTERVAL) * 100;
  bar.style.width = pct + '%';

  if (countdown <= 0) {
    refresh();
  }
}

// ── INIT ──
refresh();
setInterval(tickCountdown, 1000);
</script>
