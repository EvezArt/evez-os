# EVEZ Alertmanager Configuration
global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alerts@evez-os.ai'
  smtp_auth_username: 'alerts@evez-os.ai'
  smtp_auth_password: '${ALERT_EMAIL_PASSWORD}'

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 4h
  receiver: 'evez-default'
  routes:
    - match:
        severity: critical
      receiver: 'evez-critical'
      repeat_interval: 15m
    - match:
        severity: warning
      receiver: 'evez-warning'
      repeat_interval: 2h

receivers:
  - name: 'evez-default'
    webhook_configs:
      - url: 'http://webhook-relay:9121/alert'
        send_resolved: true

  - name: 'evez-critical'
    webhook_configs:
      - url: 'http://webhook-relay:9121/alert'
        send_resolved: true
    email_configs:
      - to: 'rubikspubes70@gmail.com'
        headers:
          Subject: '[CRITICAL] EVEZ Mesh Alert: {{ .GroupLabels.alertname }}'

  - name: 'evez-warning'
    webhook_configs:
      - url: 'http://webhook-relay:9121/alert'
        send_resolved: true

inhibit_rules:
  - source_match: { severity: 'critical' }
    target_match: { severity: 'warning' }
    equal: ['alertname', 'cluster']
